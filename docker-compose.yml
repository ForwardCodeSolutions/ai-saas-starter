services:
  api:
    container_name: saas_api
    build: ./backend
    ports: ["8003:8003"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    container_name: saas_db
    image: postgres:15
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_starter
    volumes:
      - saas_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    container_name: saas_frontend
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      API_URL: "http://api:8003"
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - with-frontend

volumes:
  saas_db_data:
